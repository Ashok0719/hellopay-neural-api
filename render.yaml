services:
  - type: web
    name: hellopay-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        sync: false # Set this to your Vercel URL
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false # Paste the JSON content here
